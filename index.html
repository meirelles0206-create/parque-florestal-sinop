<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Identificação Botânica - Parque Florestal Sinop</title>
    
    <!-- Metadados -->
    <meta name="description" content="Portal de Identificação Botânica - UFMT Sinop.">
    <meta property="og:title" content="Portal Botânico - Sinop">
    <meta name="theme-color" content="#1B4332">

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-escuro: #1B4332; 
            --verde-vibrante: #2D6A4F;
            --verde-claro: #95D5B2;
            --marrom-tronco: #6C584C;
            --creme-areia: #f3f0e5; 
            --branco: #ffffff;
            --texto: #2D3436;
            --sombra: rgba(27, 67, 50, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--creme-areia);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 500 Q250 400 500 500 T1000 500' fill='none' stroke='%231B4332' stroke-width='0.5' stroke-opacity='0.03'/%3E%3Cpath d='M0 600 Q250 500 500 600 T1000 600' fill='none' stroke='%231B4332' stroke-width='0.5' stroke-opacity='0.03'/%3E%3C/svg%3E");
            color: var(--texto);
            line-height: 1.4;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 { font-family: 'Crimson Pro', serif; }

        /* --- Header & Banner --- */
        header {
            width: 100%;
            background-color: var(--creme-areia); 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            border: none;
        }

        .banner-img { 
            width: 100%;
            max-width: 1400px;
            max-height: 180px; 
            object-fit: contain;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            transform: scale(1.001);
            -webkit-font-smoothing: antialiased;
        }

        /* --- Navegação Permanente --- */
        .navbar {
            background-color: var(--verde-escuro);
            color: var(--branco);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            height: 55px;
        }

        .nav-brand {
            font-family: 'Crimson Pro', serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--verde-claro);
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-menu-direto { display: flex; gap: 8px; }

        .btn-nav {
            background: rgba(255,255,255,0.1);
            color: var(--branco);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .btn-nav:active { background: var(--verde-vibrante); }

        .dropdown-especies { position: relative; }
        .lista-suspensa {
            position: absolute; top: 115%; right: 0;
            background: var(--branco);
            min-width: 180px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            z-index: 1100;
        }
        .lista-suspensa.show { display: flex; }
        .item-suspensa { padding: 10px 15px; color: var(--verde-escuro); text-decoration: none; font-size: 0.85rem; font-weight: 600; border-bottom: 1px solid #eee; cursor: pointer; }
        .item-suspensa:hover { background: #f0f7f4; }
        .item-suspensa:last-child { border-bottom: none; }

        /* --- Hero Section --- */
        .hero {
            background: linear-gradient(135deg, var(--verde-escuro), var(--verde-vibrante));
            color: var(--branco);
            text-align: center;
            padding: 25px 20px 70px;
            clip-path: ellipse(150% 100% at 50% 0%);
            margin-top: -1px;
        }
        .hero h1 { font-size: 2.2rem; margin-bottom: 2px; font-weight: 700; }
        .hero .scientific-name { font-size: 1.1rem; font-style: italic; opacity: 0.9; display: block; margin-bottom: 5px; }
        .hero p { font-size: 0.95rem; font-style: italic; opacity: 0.85; max-width: 600px; margin: 0 auto; }

        /* --- Main Layout --- */
        main {
            max-width: 850px;
            margin: -45px auto 40px;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--branco);
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
        }

        h2 { color: var(--verde-escuro); font-size: 1.4rem; margin-bottom: 10px; border-bottom: 2px solid var(--creme-areia); padding-bottom: 5px; }

        .secao-flex { display: flex; gap: 20px; align-items: center; margin-top: 5px; }
        .secao-texto { flex: 1.3; font-size: 0.9rem; color: #444; }
        
        .secao-img { 
            flex: 1; 
            position: relative; /* Bloqueia a fuga da legenda */
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            background: #f8f8f8;
            max-height: 300px;
            cursor: zoom-in;
        }
        .secao-img img { width: 100%; height: auto; display: block; }

        .main-img-full { 
            width: 100%; 
            position: relative; /* Bloqueia a fuga da legenda */
            border-radius: 8px; 
            overflow: hidden; 
            margin: 10px 0; 
            cursor: zoom-in; 
        }
        .main-img-full img { width: 100%; height: auto; display: block; }

        .legenda-overlay {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(transparent, rgba(27, 67, 50, 0.9));
            color: white; padding: 8px; text-align: center; font-size: 0.65rem;
            pointer-events: none;
        }

        .ficha-tecnica {
            background: var(--verde-escuro); color: var(--branco);
            padding: 15px; border-radius: 10px; margin-top: 10px;
        }
        .ficha-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .ficha-list b { color: var(--verde-claro); display: block; font-size: 0.55rem; text-transform: uppercase; }
        .ficha-list span { font-size: 0.85rem; font-weight: 600; }

        /* --- HUB DE ESPÉCIES NO FINAL --- */
        .hub-title { text-align: center; color: var(--verde-escuro); font-size: 1.2rem; margin: 40px 0 15px; font-weight: 700; }
        .grid-especies { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 12px; 
            max-width: 850px; 
            margin: 0 auto 50px; 
            padding: 0 15px;
        }
        .card-especie {
            background: var(--branco); border-radius: 10px; overflow: hidden;
            border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer; transition: 0.2s;
        }
        .card-especie-img { width: 100%; height: 100px; overflow: hidden; }
        .card-especie-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-especie-info { padding: 8px; text-align: center; }
        .card-especie-info .nome-popular { font-family: 'Crimson Pro', serif; font-size: 0.95rem; font-weight: 700; color: var(--verde-escuro); }
        .card-especie.active { border: 2px solid var(--verde-vibrante); background: #f0f7f4; }

        footer {
            padding: 40px 20px 30px; text-align: center;
            background: linear-gradient(180deg, var(--creme-areia) 0%, #e0dbc5 100%);
        }
        .logos-container { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
        .footer-logo-img { width: auto; height: auto; max-height: 55px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1)); }

        .footer-link-sobre {
            display: inline-block;
            margin-top: 15px;
            color: var(--verde-escuro);
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
        }

        /* --- Lightbox --- */
        .lightbox-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px; cursor: zoom-out;
        }
        .lightbox-content { max-width: 95%; max-height: 95%; border-radius: 4px; object-fit: contain; }

        @media (max-width: 600px) {
            .secao-flex { flex-direction: column; }
            .hero h1 { font-size: 1.8rem; }
            .grid-especies { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body onclick="fecharMenusExtras(event)">

    <header>
        <img src="https://drive.google.com/thumbnail?id=1WmROQeuAHSdlM7mZLlp8mUziSmmBENOR&sz=w2500" alt="Banner Parque" class="banner-img">
    </header>

    <nav class="navbar">
        <div class="nav-container">
            <a class="nav-brand" onclick="navegar('guaranta')">PORTAL BOTÂNICO</a>
            <div class="nav-menu-direto">
                <div class="dropdown-especies">
                    <button class="btn-nav" onclick="toggleDropdown(event)">Espécies ▾</button>
                    <div class="lista-suspensa" id="lista-especies"></div>
                </div>
                <button class="btn-nav" onclick="navegar('sobre')">Sobre</button>
            </div>
        </div>
    </nav>

    <section class="hero" id="hero-section">
        <h1 id="esp-nome">...</h1>
        <div class="scientific-name" id="esp-scientific-box"><i id="esp-cientifico">...</i> <span id="esp-autor" style="font-style: normal; font-size: 0.85rem; opacity: 0.8;">...</span></div>
        <p id="esp-tagline">...</p>
    </section>

    <main id="content-area"></main>

    <div id="hub-container">
        <h3 class="hub-title">Explorar outras espécies</h3>
        <section class="grid-especies" id="menu-especies"></section>
    </div>

    <div id="lightbox" class="lightbox-modal" onclick="fecharLightbox()">
        <img class="lightbox-content" id="img-ampliada">
    </div>

    <footer>
        <div class="logos-container">
            <img src="https://drive.google.com/thumbnail?id=11EORbYUOUCXgnYmovs2ZDu11aY413ZNZ&sz=w600" alt="UFMT" class="footer-logo-img">
            <img src="https://drive.google.com/thumbnail?id=1aJoX5wdmVXOGESwfXiFW1zL6AFytNYl_&sz=w600" alt="Herbário" class="footer-logo-img">
            <img src="https://drive.google.com/thumbnail?id=112DRxmEhLlC7-AOw_m9dvh67C88ybR5Y&sz=w600" alt="ABAM" class="footer-logo-img">
        </div>
        <div class="footer-link-sobre" onclick="navegar('sobre')">Sobre o projeto</div>
        <p style="font-size: 0.7rem; color: #1B4332; opacity: 0.6; margin-top: 10px;">Identificação Botânica — UFMT Sinop</p>
    </footer>

    <script>
        let currentId = 'guaranta'; 

        const especies = {
            "guaranta": {
                nome: "Guarantã", cientifico: "Esenbeckia leiocarpa", autor: "Engl.", tagline: "A força imponente de nossas florestas",
                ficha: { familia: "Rutaceae", porte: "20 a 50m", conservacao: "Vulnerável", bioma: "Transição" },
                intro: "O Guarantã é um marco da vitalidade nas nossas florestas tropicais. Esta árvore gigante é uma peça-chave no equilíbrio ambiental da região.",
                fotoPrincipal: { id: "19mh2_m2Y0rxG7lQY0DZZIn1EmrwtJ9Sg", legenda: "Guarantã" },
                secoes: [
                    { titulo: "🎨 Texturas", texto: "O tronco é inconfundível. Reto e de dureza lendária, possui uma casca que se renova em placas irregulares, criando um padrão marmoreado.", img: "19mh2_m2Y0rxG7lQY0DZZIn1EmrwtJ9Sg", legenda: "Tronco marmoreado" },
                    { titulo: "🍃 Folhagem", texto: "As folhas apresentam uma estrutura trifoliolada. Possuem glândulas transparentes que reservam óleos essenciais perfumados, protegendo a árvore.", img: "1SjiArlWycEGw1kX4n_T1PLpN2CBRKM1o", legenda: "Folha trifoliolada", reverse: true }
                ],
                extra: "O nome Tupi 'Guara-atã' reflete a dureza extrema desta árvore majestosa."
            },
            "acai": {
                nome: "Açaí", cientifico: "Euterpe oleracea", autor: "Mart.", tagline: "Símbolo da cultura amazónica",
                ficha: { familia: "Arecaceae", porte: "20 a 25m", conservacao: "Abundante", bioma: "Amazónia" },
                intro: "Palmeira nativa reconhecida mundialmente pela densidade nutricional dos seus frutos e estrutura esguia.",
                fotoPrincipal: { id: "12eaORkHMC0GPsIVc-QITwlkAV4C-glm6", legenda: "Açaí" },
                secoes: [
                    { titulo: "🛶 Habitat", texto: "Planta higrófila, vive em simbiose com a humidade em várzeas, fundamental para a estabilidade das margens dos rios.", img: "1LTYn7j9OAn87Cm3HaWeTLct4B6plkKb0", legenda: "Habitat natural" },
                    { titulo: "🫐 Fruto", texto: "Drupa roxo-escura rica em antocianinas. É a base da segurança alimentar de diversas populações ribeirinhas.", img: "1y3bmKWlkve-bnwQl54gC_RDhMqugZp4Y", legenda: "Cacho de frutos", reverse: true }
                ],
                extra: "O açaí consolidou-se como um pilar da bioeconomia sustentável."
            },
            "jacaranda": {
                nome: "Jacarandá", cientifico: "Jacaranda copaia", autor: "D.Don.", tagline: "Beleza e renovação da floresta",
                ficha: { familia: "Bignoniaceae", porte: "Até 35m", conservacao: "Seguro", bioma: "Amazónia" },
                intro: "Conhecido como Parapará, atua como uma 'arquiteta da sucessão' ao preparar o ambiente para espécies de crescimento lento.",
                fotoPrincipal: { id: "1LgLWH5h9mb-_7DjTvDhMIstUZh5s6YnE", legenda: "Jacarandá" },
                secoes: [
                    { titulo: "🏗️ Regeneração", texto: "Seu crescimento vertical rápido permite alcançar a luz, criando a sombra necessária para fechar clareiras.", img: "1nlHOQrGk7J8T73nMUTDvyG5L1awUfGH4", legenda: "Restauração de áreas" },
                    { titulo: "🌬️ Sementes", texto: "Produz cápsulas com sementes aladas transportadas pelo vento, garantindo a colonização eficiente.", img: "1y3bmKWlkve-bnwQl54gC_RDhMqugZp4Y", legenda: "Dispersão pelo vento", reverse: true }
                ],
                extra: "Na medicina tradicional, a infusão das folhas é valorizada como cicatrizante."
            },
            "freijo": {
                nome: "Freijó", cientifico: "Cordia goeldiana", autor: "Huber", tagline: "Uma joia das madeiras de lei",
                ficha: { familia: "Boraginaceae", porte: "20 a 35m", conservacao: "Seletiva", bioma: "Terra Firme" },
                intro: "Celebrado como uma verdadeira 'madeira de lei', o Freijó é comparado à Teca pela sua excelência técnica.",
                fotoPrincipal: { id: "1NPz1rXGAR5nITFgSFUnc7rQqyuLLyYSG", legenda: "Freijó" },
                secoes: [
                    { titulo: "⚓ Estabilidade", texto: "Sua baixíssima retratibilidade garante que a madeira não deforma, ideal para embarcações de precisão.", img: "18sPOod5ISlYqlOqFQ6rMkpfrqEQxvSGO", legenda: "Resiliência natural" },
                    { titulo: "🪵 Marcenaria", texto: "Fácil de trabalhar e com polimento excepcional, é a escolha para móveis de luxo que duram décadas.", img: "1fgfJDYkJWIcyimIRnuroZ8NeMQpAXhiu", legenda: "Valor económico", reverse: true }
                ],
                extra: "Favorito para a fabricação de guitarras de alto padrão devido à sua acústica pura."
            },
            "inga": {
                nome: "Ingá", cientifico: "Inga vera", autor: "Willd.", tagline: "A guardiã das águas ribeirinhas",
                ficha: { familia: "Fabaceae", porte: "8 a 15m", conservacao: "Seguro", bioma: "Mata Ciliar" },
                intro: "Especialista das zonas úmidas, o Ingá protege as margens contra a erosão e oferece frutos apreciados pela fauna.",
                fotoPrincipal: { id: "1sedwTURt9ldmKs7NuXW9f7Y7V7sbYOm4", legenda: "Ingá" },
                secoes: [
                    { titulo: "🌿 Arquitetura", texto: "Apresenta folhas compostas com uma 'raque alada' característica, que facilita a identificação botânica.", img: "1pHafInKd6TTYTkXKuvNB5sKzNemvf9nJ", legenda: "Raque alada" },
                    { titulo: "☁️ Doçura", texto: "A semente é envolta por um arilo branco e doce, com textura de algodão-doce, recurso vital para aves.", img: "17jV2zXv18wkYXcGyvw4vZhZr16CW_AXV", legenda: "Fruto apreciado", reverse: true }
                ],
                extra: "O nome 'Ingá' deriva do Tupi e significa 'embebido', referência à polpa suculenta."
            },
            "sobre": {
                nome: "Sobre o Projeto", cientifico: "Taxonomia Vegetal", autor: "UFMT Sinop", tagline: "Educação Ambiental e Ciência",
                intro: "Este portal é o resultado de um projeto académico desenvolvido na disciplina de <b>Taxonomia Vegetal</b> do curso de <b>Agronomia (UFMT - Campus Sinop)</b>.",
                textoCorpo: [
                    "Sob a coordenação e incentivo da <b>Prof.ª Dra. Larissa Cavalheiro</b>, o projeto visa aplicar o conhecimento botânico técnico em benefício da comunidade e da conservação ambiental.",
                    "O foco central é a construção de placas de <b>identificação taxonómica</b> para as espécies vegetais no <b>Parque Florestal de Sinop</b>, oferecendo aos visitantes uma experiência educativa rica sobre a biodiversidade nativa.",
                    "A identificação correta permite que a sociedade conheça e proteja o património biológico presente na zona de transição entre a Amazónia e o Cerrado.",
                    "O suporte científico é provido pelo <b>Herbário Centro Norte-Matogrossense</b> e o <b>Acervo Biológico da Amazónia Meridional (ABAM)</b>."
                ]
            }
        };

        function toggleDropdown(e) { e.stopPropagation(); document.getElementById('lista-especies').classList.toggle('show'); }
        function fecharMenusExtras(e) { document.getElementById('lista-especies').classList.remove('show'); }

        function navegar(id) {
            currentId = id;
            document.getElementById('lista-especies').classList.remove('show');
            try {
                const url = new URL(window.location);
                url.searchParams.set('id', id);
                window.history.pushState({id: id}, '', url);
            } catch (e) {}
            render();
        }

        function ampliarFoto(url) {
            const modal = document.getElementById('lightbox');
            const img = document.getElementById('img-ampliada');
            img.src = url.replace(/sz=w\d+/, 'sz=w2500');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function fecharLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function render() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || currentId;
            const data = especies[id] || especies['guaranta'];
            const contentArea = document.getElementById('content-area');
            const hubContainer = document.getElementById('hub-container');
            const scientificBox = document.getElementById('esp-scientific-box');
            
            document.getElementById('esp-nome').innerText = data.nome;
            document.getElementById('esp-cientifico').innerText = data.cientifico;
            document.getElementById('esp-autor').innerText = data.author;
            document.getElementById('esp-tagline').innerText = data.tagline;
            scientificBox.style.display = (id === 'sobre') ? 'none' : 'block';

            if (id === 'sobre') {
                hubContainer.style.display = 'none'; 
                contentArea.innerHTML = `
                    <section class="card">
                        <h2>🔬 Origem e Propósito</h2>
                        <p style="margin-bottom:15px;">${data.intro}</p>
                        ${data.textoCorpo.map(txt => `<p style="margin-bottom:12px;">${txt}</p>`).join('')}
                    </section>
                `;
            } else {
                hubContainer.style.display = 'block'; 
                let html = `
                    <section class="card">
                        <h2>🌳 Identificação</h2>
                        <p style="margin-bottom:12px;">${data.intro}</p>
                        <div class="main-img-full" onclick="ampliarFoto('https://drive.google.com/thumbnail?id=${data.fotoPrincipal.id}&sz=w1600')">
                            <img src="https://drive.google.com/thumbnail?id=${data.fotoPrincipal.id}&sz=w1600" alt="${data.nome}">
                            <div class="legenda-overlay">${data.fotoPrincipal.legenda}</div>
                        </div>
                        <div class="ficha-tecnica">
                            <ul class="ficha-list">
                                <li><b>Família</b> <span>${data.ficha.familia}</span></li>
                                <li><b>Porte</b> <span>${data.ficha.porte}</span></li>
                                <li><b>Status</b> <span>${data.ficha.conservacao}</span></li>
                                <li><b>Bioma</b> <span>${data.ficha.bioma}</span></li>
                            </ul>
                        </div>
                    </section>
                `;
                data.secoes.forEach(s => {
                    html += `
                        <section class="card">
                            <div class="secao-flex" style="flex-direction: ${s.reverse ? 'row-reverse' : 'row'}">
                                <div class="secao-texto"><h3>${s.titulo}</h3><p>${s.texto}</p></div>
                                <div class="secao-img" onclick="ampliarFoto('https://drive.google.com/thumbnail?id=${s.img}&sz=w1200')">
                                    <img src="https://drive.google.com/thumbnail?id=${s.img}&sz=w1200" alt="${s.titulo}">
                                    <div class="legenda-overlay">${s.legenda}</div>
                                </div>
                            </div>
                        </section>
                    `;
                });
                html += `<section class="card"><h2>📜 Nota Científica</h2><p style="font-size:0.9rem;">${data.extra}</p></section>`;
                contentArea.innerHTML = html;
            }

            const menuCards = document.getElementById('menu-especies');
            menuCards.innerHTML = '';
            Object.keys(especies).forEach(key => {
                if(key === 'sobre') return; 
                const esp = especies[key];
                const card = document.createElement('div');
                card.className = `card-especie ${key === id ? 'active' : ''}`;
                card.onclick = () => navegar(key);
                card.innerHTML = `<div class="card-especie-img"><img src="https://drive.google.com/thumbnail?id=${esp.fotoPrincipal.id}&sz=400"></div><div class="card-especie-info"><span class="nome-popular">${esp.nome}</span></div>`;
                menuCards.appendChild(card);
            });

            const dropContainer = document.getElementById('lista-especies');
            dropContainer.innerHTML = '';
            Object.keys(especies).forEach(key => {
                if(key === 'sobre') return;
                const item = document.createElement('a');
                item.className = 'item-suspensa';
                item.innerText = especies[key].nome;
                item.onclick = () => navegar(key);
                dropContainer.appendChild(item);
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        window.onload = render;
        window.onpopstate = (event) => { if(event.state && event.state.id) { currentId = event.state.id; render(); } };
    </script>
</body>
</html>
