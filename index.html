<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Identificação Botânica - Parque Florestal Sinop</title>
    
    <meta name="description" content="Portal de Identificação Botânica das espécies do Parque Florestal de Sinop - UFMT.">
    <meta property="og:title" content="Portal Botânico - Sinop">
    <meta name="theme-color" content="#1B4332">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-escuro: #1B4332; 
            --verde-vibrante: #2D6A4F;
            --verde-claro: #95D5B2;
            --marrom-tronco: #6C584C;
            --creme-areia: #f3f0e5; /* Cor exata para fusão com o banner */
            --branco: #ffffff;
            --texto: #2D3436;
            --sombra: rgba(27, 67, 50, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--creme-areia);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 500 Q250 400 500 500 T1000 500' fill='none' stroke='%231B4332' stroke-width='0.5' stroke-opacity='0.03'/%3E%3Cpath d='M0 600 Q250 500 500 600 T1000 600' fill='none' stroke='%231B4332' stroke-width='0.5' stroke-opacity='0.03'/%3E%3C/svg%3E");
            color: var(--texto);
            line-height: 1.5;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 { font-family: 'Crimson Pro', serif; }

        /* --- Header & Banner --- */
        header {
            width: 100%;
            background-color: var(--creme-areia); 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            border: none;
        }

        .banner-container { 
            width: 100%; 
            max-width: 1400px;
            display: flex;
            justify-content: center;
        }

        .banner-img { 
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            transform: scale(1.001);
            -webkit-font-smoothing: antialiased;
        }

        /* --- Navegação --- */
        .navbar {
            background-color: var(--verde-escuro);
            color: var(--branco);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 60px;
        }

        .nav-brand {
            font-family: 'Crimson Pro', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--verde-claro);
            text-decoration: none;
            cursor: pointer;
        }

        .nav-links { display: flex; list-style: none; gap: 5px; }
        .nav-link { color: var(--branco); text-decoration: none; padding: 8px 15px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; cursor: pointer; }
        .nav-link:hover { background-color: var(--verde-vibrante); }

        .dropdown-menu {
            position: absolute; top: 100%; left: 0;
            background-color: var(--branco);
            min-width: 220px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 8px 0;
            opacity: 0; visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        .nav-item:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item { padding: 10px 20px; color: var(--verde-escuro); text-decoration: none; display: block; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .dropdown-item:hover { background-color: var(--creme-areia); }

        /* --- Hero --- */
        .hero {
            background: linear-gradient(135deg, var(--verde-escuro), var(--verde-vibrante));
            color: var(--branco);
            text-align: center;
            padding: 40px 20px 100px;
            clip-path: ellipse(120% 100% at 50% 0%);
            margin-top: -1px;
        }
        .hero h1 { font-size: 2.8rem; margin-bottom: 5px; font-weight: 700; }
        .hero .scientific-name { font-size: 1.3rem; font-style: italic; opacity: 0.9; display: block; margin-bottom: 8px; }
        .hero p { font-size: 1.1rem; font-style: italic; opacity: 0.85; max-width: 650px; margin: 0 auto; line-height: 1.3; }

        /* --- Layout --- */
        main {
            max-width: 850px;
            margin: -60px auto 40px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--branco);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px var(--sombra);
            border: 1px solid rgba(27, 67, 50, 0.05);
        }

        h2 { color: var(--verde-escuro); font-size: 1.6rem; margin-bottom: 15px; line-height: 1.2; }

        .secao-flex { display: flex; gap: 25px; align-items: center; margin-top: 10px; }
        .secao-texto { flex: 1.3; font-size: 0.95rem; color: #444; }
        .secao-texto p { margin-bottom: 10px; line-height: 1.6; }
        
        .secao-img { 
            flex: 1; 
            position: relative; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            background: #f8f8f8;
            cursor: zoom-in;
        }
        .secao-img img { width: 100%; height: auto; display: block; transition: 0.3s; }

        .main-img-full { width: 100%; border-radius: 12px; overflow: hidden; margin: 15px 0; cursor: zoom-in; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .main-img-full img { width: 100%; height: auto; display: block; }

        .legenda-overlay {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(transparent, rgba(27, 67, 50, 0.85));
            color: white; padding: 10px; 
            text-align: center; font-size: 0.7rem; font-weight: 500;
        }

        .ficha-tecnica {
            background: var(--verde-escuro); color: var(--branco);
            padding: 20px; border-radius: 12px; margin-top: 15px;
        }
        .ficha-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .ficha-list li { border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 5px; }
        .ficha-list b { color: var(--verde-claro); display: block; font-size: 0.6rem; text-transform: uppercase; }
        .ficha-list span { font-size: 0.95rem; font-weight: 600; }

        /* --- Footer --- */
        footer {
            padding: 80px 20px 40px; text-align: center; position: relative;
            background: linear-gradient(180deg, var(--creme-areia) 0%, #e0dbc5 100%);
        }
        .logos-container { display: flex; justify-content: center; align-items: center; gap: 40px; flex-wrap: wrap; margin-bottom: 25px; position: relative; z-index: 5; }
        .footer-logo-img { width: auto; height: auto; max-height: 80px; }
        .footer-disclaimer { font-size: 0.8rem; color: var(--verde-escuro); opacity: 0.7; margin-top: 10px; }

        /* --- Lightbox --- */
        .lightbox-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px; cursor: zoom-out;
        }
        .lightbox-content { max-width: 95%; max-height: 95%; border-radius: 4px; object-fit: contain; }

        @media (max-width: 768px) {
            .secao-flex { flex-direction: column; }
            .hero h1 { font-size: 2.2rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="banner-container">
            <img src="https://drive.google.com/thumbnail?id=1WmROQeuAHSdlM7mZLlp8mUziSmmBENOR&sz=w2500" alt="Banner Parque Florestal" class="banner-img">
        </div>
    </header>

    <nav class="navbar">
        <div class="nav-container">
            <a class="nav-brand" onclick="navegar('guaranta')">PORTAL BOTÂNICO</a>
            <ul class="nav-links">
                <li class="nav-item">
                    <a class="nav-link">Espécies ▾</a>
                    <ul class="dropdown-menu" id="nav-dropdown-species"></ul>
                </li>
                <li class="nav-item"><a class="nav-link" onclick="navegar('sobre')">Sobre o Projeto</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero" id="hero-section">
        <h1 id="esp-nome">...</h1>
        <div class="scientific-name" id="esp-scientific-box"><i id="esp-cientifico">...</i> <span id="esp-autor" class="author">...</span></div>
        <p id="esp-tagline">...</p>
    </section>

    <main id="content-area"></main>

    <div id="lightbox" class="lightbox-modal" onclick="fecharLightbox()">
        <img class="lightbox-content" id="img-ampliada">
    </div>

    <footer>
        <div class="logos-container">
            <img src="https://drive.google.com/thumbnail?id=11EORbYUOUCXgnYmovs2ZDu11aY413ZNZ&sz=w600" alt="UFMT" class="footer-logo-img">
            <img src="https://drive.google.com/thumbnail?id=1aJoX5wdmVXOGESwfXiFW1zL6AFytNYl_&sz=w600" alt="Herbário Centro Norte-Matogrossense" class="footer-logo-img">
            <img src="https://drive.google.com/thumbnail?id=112DRxmEhLlC7-AOw_m9dvh67C88ybR5Y&sz=w600" alt="ABAM" class="footer-logo-img">
        </div>
        <p class="footer-disclaimer">Educação e valorização da biodiversidade nativa.</p>
    </footer>

    <script>
        let currentId = 'guaranta'; 

        const especies = {
            "guaranta": {
                nome: "Guarantã", cientifico: "Esenbeckia leiocarpa", autor: "Engl.", tagline: "A força imponente de nossas florestas preservadas",
                ficha: { familia: "Rutaceae", porte: "20 a 50m", conservacao: "Vulnerável", significado: "Pau Rígido", bioma: "Transição" },
                intro: "O Guarantã é um marco da vitalidade nas nossas florestas tropicais. Com um ciclo de vida que atravessa gerações, esta árvore gigante é uma peça-chave no equilíbrio ambiental.",
                fotoPrincipal: { id: "19mh2_m2Y0rxG7lQY0DZZIn1EmrwtJ9Sg", legenda: "Guarantã" },
                secoes: [
                    { titulo: "🎨 Texturas", texto: "O tronco do Guarantã é inconfundível. Reto e de dureza lendária, possui uma casca que se renova em placas irregulares, criando um padrão marmoreado único.", img: "19mh2_m2Y0rxG7lQY0DZZIn1EmrwtJ9Sg", legenda: "Tronco marmoreado" },
                    { titulo: "🍃 Folhagem", texto: "As folhas apresentam uma estrutura trifoliolada. Possuem glândulas transparentes que reservam óleos essenciais perfumados, que protegem a árvore.", img: "1SjiArlWycEGw1kX4n_T1PLpN2CBRKM1o", legenda: "Folha trifoliolada", reverse: true }
                ],
                extra: "O nome Tupi 'Guara-atã' reflete o conhecimento ancestral sobre a dureza extrema desta árvore majestosa."
            },
            "acai": {
                nome: "Açaí", cientifico: "Euterpe oleracea", autor: "Mart.", tagline: "Símbolo máximo da cultura amazônica",
                ficha: { familia: "Arecaceae", porte: "20 a 25m", conservacao: "Abundante", significado: "Fruto que chora", bioma: "Amazônia" },
                intro: "O açaizeiro é uma palmeira nativa emblemática, reconhecida mundialmente pela densidade nutricional dos seus frutos e por sua estrutura esguia.",
                fotoPrincipal: { id: "12eaORkHMC0GPsIVc-QITwlkAV4C-glm6", legenda: "Açaí" },
                secoes: [
                    { titulo: "🛶 Habitat", texto: "Planta higrófila, vive em simbiose com a umidade constante em ecossistemas de várzea e igapó. Forma agrupamentos fundamentais para as margens dos rios.", img: "1LTYn7j9OAn87Cm3HaWeTLct4B6plkKb0", legenda: "Habitat natural" },
                    { titulo: "🫐 Fruto", texto: "O fruto é uma drupa roxo-escura rica em antocianinas. Embora a polpa represente uma pequena parte do volume, ela é uma fonte energética vital.", img: "1y3bmKWlkve-bnwQl54gC_RDhMqugZp4Y", legenda: "Cacho de frutos", reverse: true }
                ],
                extra: "Base da alimentação ribeirinha, o açaí consolidou-se como um pilar da bioeconomia sustentável."
            },
            "jacaranda": {
                nome: "Jacarandá-copaia", cientifico: "Jacaranda copaia", autor: "D.Don.", tagline: "Beleza violeta e renovação da floresta",
                ficha: { familia: "Bignoniaceae", porte: "Até 35m", conservacao: "Seguro", significado: "Fragrância", bioma: "Amazônia" },
                intro: "O Jacarandá-copaia, ou Parapará, atua como uma 'arquiteta da sucessão florestal' ao preparar o ambiente para espécies de crescimento lento.",
                fotoPrincipal: { id: "1LgLWH5h9mb-_7DjTvDhMIstUZh5s6YnE", legenda: "Jacarandá" },
                secoes: [
                    { titulo: "🏗️ Regeneração", texto: "Seu crescimento vertical rápido permite alcançar a luz solar acima da vegetação baixa, criando a sombra necessária para que a floresta 'feche' suas clareiras.", img: "1nlHOQrGk7J8T73nMUTDvyG5L1awUfGH4", legenda: "Restauração de áreas" },
                    { titulo: "🌬️ Sementes", texto: "Produz cápsulas com sementes aladas transportadas pelo vento por quilômetros, garantindo que a espécie colonize novas áreas eficientemente.", img: "1y3bmKWlkve-bnwQl54gC_RDhMqugZp4Y", legenda: "Dispersão anemocórica", reverse: true }
                ],
                extra: "Na medicina tradicional, a infusão das suas folhas é utilizada para tratar doenças de pele."
            },
            "freijo": {
                nome: "Freijó-branco", cientifico: "Cordia goeldiana", autor: "Huber", tagline: "Uma joia das madeiras de lei brasileiras",
                ficha: { familia: "Boraginaceae", porte: "20 a 35m", conservacao: "Seletiva", significado: "Madeira Clara", bioma: "Terra Firme" },
                intro: "O Freijó-branco é celebrado internacionalmente como uma verdadeira 'madeira de lei', comparada à Teca pela sua excelência técnica.",
                fotoPrincipal: { id: "1NPz1rXGAR5nITFgSFUnc7rQqyuLLyYSG", legenda: "Freijó" },
                secoes: [
                    { titulo: "⚓ Estabilidade", texto: "Sua baixíssima retratibilidade garante que a madeira quase não deforma com mudanças de umidade, ideal para construções de precisão.", img: "18sPOod5ISlYqlOqFQ6rMkpfrqEQxvSGO", legenda: "Resiliência no habitat" },
                    { titulo: "🪵 Marcenaria", texto: "Fácil de trabalhar e com polimento excepcional, é o material de escolha para móveis de luxo que preservam a integridade por décadas.", img: "1fgfJDYkJWIcyimIRnuroZ8NeMQpAXhiu", legenda: "Valor econômico", reverse: true }
                ],
                extra: "Devido à sua ressonância acústica pura, é favorito para a fabricação de guitarras de alto padrão."
            },
            "inga": {
                nome: "Ingá-do-brejo", cientifico: "Inga vera", autor: "Willd.", tagline: "Guardiã das águas e doce sustento ribeirinho",
                ficha: { familia: "Fabaceae", porte: "8 a 15m", conservacao: "Seguro", significado: "Semeado", bioma: "Mata Ciliar" },
                intro: "Especialista em viver às margens de rios, o Ingá protege o solo contra a erosão e oferece um dos frutos mais apreciados da fauna.",
                fotoPrincipal: { id: "1sedwTURt9ldmKs7NuXW9f7Y7V7sbYOm4", legenda: "Ingá" },
                secoes: [
                    { titulo: "🌿 Arquitetura", texto: "Apresenta folhas compostas com uma 'raque alada' (expansão entre os folíolos), característica marcante de identificação botânica.", img: "1pHafInKd6TTYTkXKuvNB5sKzNemvf9nJ", legenda: "Detalhe da raque" },
                    { titulo: "☁️ Doçura", texto: "O fruto revela sementes envoltas por um arilo branco e doce, com textura que lembra algodão-doce, recurso vital para aves e primatas.", img: "17jV2zXv18wkYXcGyvw4vZhZr16CW_AXV", legenda: "Fruto aberto", reverse: true }
                ],
                extra: "O nome 'Ingá' deriva do Tupi-Guarani e significa 'embebido', referência à suculência da polpa branca."
            }
        };

        function navegar(id) {
            currentId = id;
            render();
        }

        function ampliarFoto(url) {
            const modal = document.getElementById('lightbox');
            const img = document.getElementById('img-ampliada');
            img.src = url.replace(/sz=w\d+/, 'sz=w2500');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function fecharLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function render() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || currentId;
            const contentArea = document.getElementById('content-area');
            const scientificBox = document.getElementById('esp-scientific-box');
            
            if (id === 'sobre') {
                document.getElementById('esp-nome').innerText = "O Projeto";
                scientificBox.style.display = 'none';
                document.getElementById('esp-tagline').innerText = "Ciência e Educação Ambiental em Sinop";
                contentArea.innerHTML = `
                    <section class="card">
                        <h2>🔬 Origem e Propósito</h2>
                        <div class="secao-texto">
                            <p>Projeto acadêmico da disciplina de <b>Taxonomia Vegetal</b> do curso de <b>Agronomia (UFMT/Sinop)</b>, sob coordenação da <b>Prof.ª Dra. Larissa Cavalheiro</b>.</p>
                            <p>O foco principal é a construção de placas de identificação taxonômica para o <b>Parque Florestal de Sinop</b>, unindo rigor técnico e educação ambiental para a comunidade local.</p>
                        </div>
                    </section>
                    <section class="card">
                        <h2>🏛️ Parceria Científica</h2>
                        <div class="secao-texto">
                            <p>Contamos com o suporte institucional do <b>Herbário Centro Norte-Matogrossense</b> e do <b>Acervo Biológico da Amazônia Meridional (ABAM)</b>, garantindo a validação da nossa flora regional.</p>
                        </div>
                    </section>
                `;
            } else {
                scientificBox.style.display = 'block';
                const data = especies[id] || especies['guaranta'];
                document.getElementById('esp-nome').innerText = data.nome;
                document.getElementById('esp-cientifico').innerText = data.cientifico;
                document.getElementById('esp-autor').innerText = data.author;
                document.getElementById('esp-tagline').innerText = data.tagline;

                let html = `
                    <section class="card">
                        <h2>🌳 Identificação</h2>
                        <p style="margin-bottom:12px;">${data.intro}</p>
                        <div class="main-img-full" onclick="ampliarFoto('https://drive.google.com/thumbnail?id=${data.fotoPrincipal.id}&sz=w1600')">
                            <img src="https://drive.google.com/thumbnail?id=${data.fotoPrincipal.id}&sz=w1600" alt="${data.nome}">
                        </div>
                        <div class="ficha-tecnica">
                            <ul class="ficha-list">
                                <li><b>Família</b> <span>${data.ficha.familia}</span></li>
                                <li><b>Porte</b> <span>${data.ficha.porte}</span></li>
                                <li><b>Conservação</b> <span>${data.ficha.conservacao}</span></li>
                                <li><b>Significado</b> <span>${data.ficha.significado}</span></li>
                                <li><b>Habitat</b> <span>${data.ficha.bioma}</span></li>
                            </ul>
                        </div>
                    </section>
                `;
                data.secoes.forEach(s => {
                    html += `
                        <section class="card">
                            <div class="secao-flex" style="flex-direction: ${s.reverse ? 'row-reverse' : 'row'}">
                                <div class="secao-texto">
                                    <h3>${s.titulo}</h3>
                                    <p>${s.texto}</p>
                                </div>
                                <div class="secao-img" onclick="ampliarFoto('https://drive.google.com/thumbnail?id=${s.img}&sz=w800')">
                                    <img src="https://drive.google.com/thumbnail?id=${s.img}&sz=w800" alt="${s.titulo}">
                                    <div class="legenda-overlay">${s.legenda}</div>
                                </div>
                            </div>
                        </section>
                    `;
                });
                html += `<section class="card"><h2>📜 Curiosidades</h2><p>${data.extra}</p></section>`;
                contentArea.innerHTML = html;
            }

            const navDropdown = document.getElementById('nav-dropdown-species');
            navDropdown.innerHTML = '';
            Object.keys(especies).forEach(key => {
                const esp = especies[key];
                const dropLink = document.createElement('li');
                dropLink.className = 'dropdown-item';
                dropLink.innerText = esp.nome;
                dropLink.onclick = () => navegar(key);
                navDropdown.appendChild(dropLink);
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = render;
    </script>
</body>
</html>
